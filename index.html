    
    <script>
        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('vaultedLoggedIn') === 'true';
            if (!isLoggedIn) {
                window.location.href = 'auth.html';
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
